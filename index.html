<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- 增强视口锁定，覆盖全面屏，禁用缩放 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>翊铭游戏 · 色块闪避大师</title>
  <!-- 苹果风格字体 & Font Awesome -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ----- 全局重置与性能优化 ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      min-height: 100vh;
      color: rgba(255, 255, 255, 0.92);
      line-height: 1.5;
      overflow-x: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transform: translateZ(0);
    }

    /* ----- 轻量化动态背景 ----- */
    .blob-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.8;
      pointer-events: none;
    }

    .blob {
      position: absolute;
      width: 80vmax;
      height: 80vmax;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255, 120, 200, 0.8), rgba(100, 200, 255, 0.6));
      mix-blend-mode: screen;
      animation: moveBlob 20s infinite alternate ease-in-out;
      will-change: transform;
      filter: blur(70px) contrast(1.1);
    }

    .blob:nth-child(1) {
      top: -20%;
      left: -20%;
      background: radial-gradient(circle, #ff6ec4, #7873f5);
      animation-duration: 25s;
    }
    .blob:nth-child(2) {
      bottom: -30%;
      right: -20%;
      width: 100vmax;
      height: 100vmax;
      background: radial-gradient(circle, #3b9eff, #ff57b9);
      animation-duration: 30s;
      animation-delay: -5s;
    }
    .blob:nth-child(3) {
      top: 40%;
      left: 10%;
      width: 70vmax;
      height: 70vmax;
      background: radial-gradient(circle, #a0f2ff, #ffb3ea);
      animation-duration: 22s;
      animation-delay: -2s;
    }

    @keyframes moveBlob {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(5%, -5%) scale(1.15); }
    }

    /* 轻量叠加层代替颗粒噪点 */
    .overlay-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
      mix-blend-mode: overlay;
    }

    /* ----- 主内容层（适应安全区域）----- */
    .content {
      position: relative;
      z-index: 20;
      max-width: 1300px;
      width: 100%;
      margin: 0 auto;
      padding: env(safe-area-inset-top, 2rem) env(safe-area-inset-right, 1.5rem) env(safe-area-inset-bottom, 2rem) env(safe-area-inset-left, 1.5rem);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ----- 头部毛玻璃 ----- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: clamp(2rem, 5vh, 4rem);
      flex-wrap: wrap;
      gap: 1rem 1.5rem;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px) saturate(180%);
      -webkit-backdrop-filter: blur(15px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 60px;
      padding: 0.8rem 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      will-change: transform;
      width: 100%;
    }

    .logo {
      font-weight: 600;
      font-size: clamp(1.4rem, 4vw, 1.8rem);
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff, #e0e0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo i {
      font-size: 1.8em;
      color: white;
      filter: drop-shadow(0 0 15px #ffaaff);
    }

    .badge {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(5px);
      border-radius: 100px;
      padding: 0.5rem 1.5rem;
      font-size: 0.9rem;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.9);
      white-space: nowrap;
    }

    /* ----- 主卡片（全响应式）----- */
    .hero-card {
      background: rgba(40, 40, 60, 0.2);
      backdrop-filter: blur(25px) saturate(160%);
      -webkit-backdrop-filter: blur(25px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: clamp(32px, 5vw, 64px);
      padding: clamp(2rem, 4vw, 3.5rem);
      margin-bottom: clamp(2rem, 5vh, 4rem);
      box-shadow: 0 50px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1) inset;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(350px, 100%), 1fr));
      gap: 2.5rem;
      align-items: center;
      transition: box-shadow 0.3s;
      will-change: transform, box-shadow;
      width: 100%;
    }

    .game-name {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 1rem;
      background: linear-gradient(to bottom, #fff, #e0c0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 20px rgba(255,255,255,0.2);
      word-break: break-word;
    }

    .game-desc {
      font-size: clamp(1rem, 3vw, 1.3rem);
      font-weight: 300;
      color: rgba(255,255,255,0.8);
      margin-bottom: 2rem;
    }

    .feature-mini {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem 1.2rem;
      margin-bottom: 2.5rem;
    }

    .feature-mini span {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 40px;
      padding: 0.5rem 1.5rem;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem 1rem;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.45);
      border-radius: 60px;
      padding: clamp(1rem, 3vw, 1.3rem) clamp(2rem, 5vw, 3rem);
      font-size: clamp(1.2rem, 4vw, 2rem);
      font-weight: 600;
      color: white;
      text-decoration: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      transition: all 0.2s;
      border-bottom: 2px solid rgba(255,255,255,0.6);
      will-change: transform, box-shadow;
      width: fit-content;
      max-width: 100%;
    }

    .btn-download i {
      font-size: 1.5em;
      color: white;
      filter: drop-shadow(0 0 10px white);
    }

    .file-info {
      margin-top: 1.2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
    }

    /* 右侧预览 */
    .liquid-preview {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 48px;
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(5px);
      min-height: 200px;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 2rem 1rem;
    }

    .liquid-shapes {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      align-items: center;
    }

    .liquid-shapes .shape {
      width: clamp(60px, 15vw, 90px);
      height: clamp(60px, 15vw, 90px);
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 30px;
      box-shadow: 0 0 30px rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: clamp(1.5rem, 5vw, 2rem);
      animation: gentleFloat 6s infinite alternate;
      will-change: transform;
    }

    @keyframes gentleFloat {
      0% { transform: translateY(0) rotate(0deg); }
      100% { transform: translateY(-8px) rotate(2deg); }
    }

    /* 游戏库网格 */
    .library-section {
      margin-top: auto;
      width: 100%;
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: clamp(1rem, 3vw, 1.2rem);
      margin-bottom: 1.8rem;
      color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(8px);
      border-radius: 60px;
      padding: 0.6rem 2rem;
      width: fit-content;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(200px, 100%), 1fr));
      gap: 25px;
      width: 100%;
    }

    .game-card {
      background: rgba(30, 30, 40, 0.2);
      backdrop-filter: blur(15px) saturate(150%);
      -webkit-backdrop-filter: blur(15px) saturate(150%);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 40px;
      padding: 2rem 1.5rem;
      transition: box-shadow 0.2s;
      box-shadow: 0 15px 30px rgba(0,0,0,0.3);
      color: white;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      will-change: transform;
    }

    .game-card.current {
      border: 2px solid rgba(255,255,255,0.4);
      background: rgba(80, 100, 180, 0.15);
    }

    .game-icon {
      font-size: 2.8rem;
      filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
    }

    .game-card h3 {
      font-size: 1.8rem;
      font-weight: 500;
      word-break: break-word;
    }

    .card-tag {
      background: rgba(255,255,255,0.1);
      border-radius: 40px;
      padding: 0.2rem 1rem;
      align-self: flex-start;
      font-size: 0.8rem;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .footer {
      margin-top: 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1.5rem;
      padding: 1.5rem 0;
      border-top: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.6);
      width: 100%;
    }

    .footer-links {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
    }

    .footer-links a {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover {
      color: white;
    }

    /* 超小屏额外优化 */
    @media (max-width: 480px) {
      .header {
        padding: 0.6rem 1rem;
      }
      .badge {
        padding: 0.4rem 1rem;
        font-size: 0.8rem;
      }
      .feature-mini span {
        padding: 0.4rem 1rem;
        font-size: 0.85rem;
      }
      .game-card {
        padding: 1.5rem 1rem;
      }
    }

    /* 超宽屏优化 */
    @media (min-width: 1600px) {
      .content {
        max-width: 1500px;
      }
    }
  </style>
</head>
<body>
  <!-- 动态背景 -->
  <div class="blob-container">
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>
  </div>
  <div class="overlay-glow"></div>

  <div class="content">
    <!-- 头部 -->
    <header class="header">
      <div class="logo">
        <i class="fas fa-droplet"></i> 翊铭游戏
      </div>
      <div class="badge">
        <i class="fas fa-gamepad"></i> 目前一款 · 敬请期待
      </div>
    </header>

    <!-- 主卡片 -->
    <div class="hero-card">
      <div class="game-title-block">
        <h1 class="game-name">色块闪避大师</h1>
        <p class="game-desc">反应力挑战 · 极简霓虹 · 动态难度</p>
        <div class="feature-mini">
          <span><i class="fas fa-bolt"></i> 瞬移闪避</span>
          <span><i class="fas fa-infinity"></i> 无尽模式</span>
          <span><i class="fas fa-palette"></i> 流光色块</span>
        </div>
        <div class="download-area">
          <!-- 下载链接已更新为 v2.0.0 Release 页面 -->
          <a href="https://github.com/dywzej/dywzej.github.io/releases/tag/v2.0.0" target="_blank" class="btn-download">
            <i class="fas fa-arrow-down"></i> 下载APK
          </a>
          <div class="file-info">
            <span><i class="fas fa-cube"></i> 28MB</span>
            <span><i class="fas fa-shield"></i> 无广告 安卓8.0+</span>
            <span><i class="fas fa-clock"></i> 2025.03</span>
          </div>
        </div>
        <p style="margin-top: 1rem; font-size: 0.8rem; color: rgba(255,255,255,0.5);">
          <i class="fas fa-info-circle"></i> 点击跳转至GitHub Release，再点击APK文件即可下载
        </p>
      </div>
      <div class="liquid-preview">
        <div class="liquid-shapes">
          <div class="shape"><i class="fas fa-square"></i></div>
          <div class="shape"><i class="fas fa-diamond"></i></div>
          <div class="shape"><i class="fas fa-circle"></i></div>
        </div>
      </div>
    </div>

    <!-- 游戏库 -->
    <div class="library-section">
      <div class="section-label">
        <i class="fas fa-layer-group"></i> 游戏系列
      </div>
      <div class="game-grid">
        <div class="game-card current">
          <div class="game-icon"><i class="fas fa-shapes"></i></div>
          <h3>色块闪避大师</h3>
          <p>v2.0 · 最新版</p>
          <div class="card-tag"><i class="fas fa-mobile-alt"></i> 安卓APK</div>
        </div>
        <div class="game-card coming">
          <div class="game-icon"><i class="fas fa-question"></i></div>
          <h3>新作开发中</h3>
          <p>2025 敬请期待</p>
          <div class="card-tag"><i class="fas fa-hourglass"></i> 筹备</div>
        </div>
        <div class="game-card coming">
          <div class="game-icon"><i class="fas fa-star"></i></div>
          <h3>绝密项目</h3>
          <p>coming soon</p>
          <div class="card-tag"><i class="fas fa-lock"></i> 隐秘</div>
        </div>
        <div class="game-card coming">
          <div class="game-icon"><i class="fas fa-compact-disc"></i></div>
          <h3>节奏实验室</h3>
          <p>早期原型</p>
          <div class="card-tag"><i class="fas fa-flask"></i> 实验</div>
        </div>
      </div>
    </div>

    <!-- 底部 -->
    <footer class="footer">
      <div class="copyright">
        <i class="far fa-copyright"></i> 2025 翊铭游戏 · 独立创造
      </div>
      <div class="footer-links">
        <a href="#"><i class="fab fa-github"></i> GitHub</a>
        <a href="#"><i class="fas fa-envelope"></i> 联系</a>
        <a href="#"><i class="fas fa-history"></i> 更新</a>
      </div>
    </footer>
  </div>
</body>
</html>
