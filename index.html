<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>翊铭游戏 · 色块闪避大师</title>
  <!-- 苹果风格字体 (SF Pro 替代) & Font Awesome -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      min-height: 100vh;
      color: rgba(255, 255, 255, 0.9);
      line-height: 1.5;
      overflow-x: hidden;
      position: relative;
    }

    /* ---------- 液态背景 · 动态折射光晕 ---------- */
    .blob-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      filter: blur(70px) contrast(1.2);
      z-index: 0;
      animation: hueRotate 18s infinite linear;
      opacity: 0.9;
    }

    @keyframes hueRotate {
      0% { filter: blur(70px) contrast(1.2) hue-rotate(0deg); }
      100% { filter: blur(70px) contrast(1.2) hue-rotate(360deg); }
    }

    .blob {
      position: absolute;
      width: 50vmax;
      height: 50vmax;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255, 120, 200, 0.9), rgba(100, 200, 255, 0.7));
      mix-blend-mode: screen;
      animation: moveBlob 24s infinite alternate ease-in-out;
    }

    .blob:nth-child(1) {
      top: -20%;
      left: -10%;
      background: radial-gradient(circle, #ff6ec4, #7873f5);
      animation-duration: 27s;
      animation-delay: -3s;
    }

    .blob:nth-child(2) {
      bottom: -30%;
      right: -10%;
      width: 70vmax;
      height: 70vmax;
      background: radial-gradient(circle, #3b9eff, #ff57b9);
      animation-duration: 32s;
      animation-delay: -7s;
    }

    .blob:nth-child(3) {
      top: 40%;
      left: 30%;
      width: 45vmax;
      height: 45vmax;
      background: radial-gradient(circle, #a0f2ff, #ffb3ea);
      animation-duration: 20s;
      animation-delay: -2s;
    }

    @keyframes moveBlob {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(8%, -8%) scale(1.2); }
    }

    /* 颗粒质感 (轻微噪点) */
    .grain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjc1IiBudW1PY3RhdmVzPSIzIiAvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNmKSIgb3BhY2l0eT0iMC4wMjUiIC8+PC9zdmc+');
      pointer-events: none;
      opacity: 0.3;
      z-index: 1;
    }

    /* 主内容层 (位于毛玻璃之上) */
    .content {
      position: relative;
      z-index: 20;
      max-width: 1300px;
      margin: 0 auto;
      padding: 2rem 2rem 2rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(0); /* 不直接作用于内容，卡片自身有毛玻璃 */
    }

    /* ----- 标题区域 (半透明) ----- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4rem;
      flex-wrap: wrap;
      gap: 1.5rem;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 60px;
      padding: 0.8rem 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1) inset;
    }

    .logo {
      font-weight: 600;
      font-size: 1.8rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff, #e0e0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo i {
      font-size: 2rem;
      color: white;
      filter: drop-shadow(0 0 15px #ffaaff);
    }

    .badge {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(5px);
      border-radius: 100px;
      padding: 0.5rem 1.5rem;
      font-size: 0.9rem;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.9);
    }

    /* ----- 主卡片 · 液体玻璃效果 ----- */
    .hero-card {
      background: rgba(40, 40, 60, 0.25);
      backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 64px;
      padding: 3rem 3.5rem;
      margin-bottom: 4rem;
      box-shadow: 0 50px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.2) inset, 0 0 40px rgba(255,255,255,0.2);
      transition: transform 0.3s, box-shadow 0.4s;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.5rem;
      align-items: center;
      border-bottom: 2px solid rgba(255,255,255,0.3);
    }

    .hero-card:hover {
      box-shadow: 0 60px 100px rgba(150, 100, 255, 0.3), 0 0 0 2px rgba(255,255,255,0.4) inset;
      transform: scale(1.01);
    }

    /* 左侧内容 */
    .game-title-block {
      color: white;
    }

    .game-name {
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 1.2rem;
      background: linear-gradient(to bottom, #fff, #e0c0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 20px rgba(255,255,255,0.3);
    }

    .game-desc {
      font-size: 1.3rem;
      font-weight: 300;
      color: rgba(255,255,255,0.8);
      margin-bottom: 2rem;
      backdrop-filter: blur(2px);
    }

    .feature-mini {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      margin-bottom: 2.5rem;
    }

    .feature-mini span {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 40px;
      padding: 0.5rem 1.5rem;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .feature-mini i {
      color: #aad0ff;
    }

    .download-area {
      margin-top: 1rem;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.45);
      border-radius: 60px;
      padding: 1.3rem 3rem;
      font-size: 2rem;
      font-weight: 600;
      color: white;
      text-decoration: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3), 0 0 30px rgba(255,255,255,0.2);
      transition: all 0.25s;
      border-bottom: 2px solid rgba(255,255,255,0.8);
      letter-spacing: -0.01em;
    }

    .btn-download i {
      font-size: 2.2rem;
      color: white;
      filter: drop-shadow(0 0 10px white);
    }

    .btn-download:hover {
      background: rgba(255,255,255,0.3);
      border-color: white;
      box-shadow: 0 20px 50px rgba(255,255,255,0.3), 0 0 40px #ffaaff;
      transform: translateY(-4px);
    }

    .file-info {
      margin-top: 1.2rem;
      display: flex;
      gap: 2rem;
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
    }

    /* 右侧折射动画块 (模拟液体流动) */
    .liquid-preview {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 48px;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(5px);
      padding: 2rem 1rem;
      min-height: 280px;
      border: 1px solid rgba(255,255,255,0.15);
      overflow: hidden;
    }

    .liquid-shapes {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .liquid-shapes .shape {
      width: 90px;
      height: 90px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 30px;
      transform: rotate(10deg) skew(5deg);
      box-shadow: 0 0 50px rgba(255,255,255,0.3);
      animation: liquidMove 8s infinite alternate;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 2rem;
    }

    .shape:nth-child(1) { animation-delay: 0s; background: rgba(255, 180, 200, 0.25); }
    .shape:nth-child(2) { animation-delay: -2s; border-radius: 50%; width: 110px; height: 110px; background: rgba(150, 220, 255, 0.25); }
    .shape:nth-child(3) { animation-delay: -4s; transform: rotate(-5deg); background: rgba(220, 170, 255, 0.25); }

    @keyframes liquidMove {
      0% { transform: translateY(0) rotate(0deg) scale(1); border-radius: 30px; }
      100% { transform: translateY(-20px) rotate(8deg) scale(1.1); border-radius: 50px; background: rgba(255,255,255,0.2); }
    }

    /* ----- 游戏库区域 (未来扩展) ----- */
    .library-section {
      margin-top: 3rem;
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.2rem;
      margin-bottom: 1.8rem;
      color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      border-radius: 60px;
      padding: 0.6rem 2rem;
      width: fit-content;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 25px;
    }

    .game-card {
      background: rgba(30, 30, 40, 0.25);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 40px;
      padding: 2rem 1.5rem;
      transition: 0.2s;
      box-shadow: 0 15px 30px rgba(0,0,0,0.4);
      color: white;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .game-card.current {
      border: 2px solid rgba(255,255,255,0.5);
      background: rgba(80, 100, 180, 0.2);
      box-shadow: 0 0 40px rgba(180, 230, 255, 0.3);
    }

    .game-card.coming {
      opacity: 0.7;
    }

    .game-icon {
      font-size: 2.8rem;
      filter: drop-shadow(0 0 15px white);
    }

    .game-card h3 {
      font-size: 1.8rem;
      font-weight: 500;
    }

    .game-card p {
      color: rgba(255,255,255,0.7);
    }

    .card-tag {
      background: rgba(255,255,255,0.1);
      border-radius: 40px;
      padding: 0.2rem 1rem;
      align-self: flex-start;
      font-size: 0.8rem;
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* 底部 */
    .footer {
      margin-top: 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 0;
      border-top: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.6);
      backdrop-filter: blur(10px);
    }

    .footer-links a {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      margin-left: 2rem;
      transition: 0.2s;
    }

    .footer-links a:hover {
      color: white;
      text-shadow: 0 0 10px white;
    }

    @media (max-width: 800px) {
      .hero-card {
        grid-template-columns: 1fr;
        padding: 2rem;
        border-radius: 48px;
      }
      .game-name {
        font-size: 3rem;
      }
      .btn-download {
        font-size: 1.5rem;
        padding: 1rem 2rem;
      }
      .footer {
        flex-direction: column;
        gap: 1rem;
        align-items: flex-start;
      }
      .footer-links a {
        margin-left: 0;
        margin-right: 1.5rem;
      }
    }

    @media (max-width: 500px) {
      .header {
        border-radius: 40px;
        padding: 0.8rem 1.2rem;
      }
      .game-name {
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <!-- 动态液体背景 (实时折射感) -->
  <div class="blob-container">
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>
  </div>
  <div class="grain"></div>

  <div class="content">
    <!-- 头部毛玻璃条 -->
    <header class="header">
      <div class="logo">
        <i class="fas fa-droplet"></i> 翊铭游戏
      </div>
      <div class="badge">
        <i class="fas fa-gamepad"></i> 目前一款 · 敬请期待更多
      </div>
    </header>

    <!-- 主卡片 · 液体毛玻璃 + 折射动画 -->
    <div class="hero-card">
      <div class="game-title-block">
        <h1 class="game-name">色块闪避大师</h1>
        <p class="game-desc">反应力挑战 · 极简霓虹 · 动态难度</p>
        <div class="feature-mini">
          <span><i class="fas fa-bolt"></i> 瞬移闪避</span>
          <span><i class="fas fa-infinity"></i> 无尽模式</span>
          <span><i class="fas fa-palette"></i> 流光色块</span>
        </div>
        <div class="download-area">
          <!-- 替换为你的APK路径，例如 ./apks/colorblock.apk -->
          <a href="./downloads/color-block-master-v1.0.apk" download="色块闪避大师.apk" class="btn-download">
            <i class="fas fa-arrow-down"></i> 下载APK
          </a>
          <div class="file-info">
            <span><i class="fas fa-cube"></i> 28MB</span>
            <span><i class="fas fa-shield"></i> 无广告 安卓8.0+</span>
            <span><i class="fas fa-clock"></i> 2025.03</span>
          </div>
        </div>
      </div>
      <div class="liquid-preview">
        <div class="liquid-shapes">
          <div class="shape"><i class="fas fa-square"></i></div>
          <div class="shape"><i class="fas fa-diamond"></i></div>
          <div class="shape"><i class="fas fa-circle"></i></div>
        </div>
        <!-- 额外折射光效（微流动） -->
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.15) 0%, transparent 60%); pointer-events: none; mix-blend-mode: overlay;"></div>
      </div>
    </div>

    <!-- 游戏库 — 目前只有一款，但预留扩展位 (同样毛玻璃) -->
    <div class="library-section">
      <div class="section-label">
        <i class="fas fa-layer-group"></i> 游戏系列 <span style="opacity:0.6; margin-left: 12px;">(色块闪避大师 已发布)</span>
      </div>
      <div class="game-grid">
        <!-- 当前游戏卡片 (突出显示) -->
        <div class="game-card current">
          <div class="game-icon"><i class="fas fa-shapes"></i></div>
          <h3>色块闪避大师</h3>
          <p>v1.0 · 正式版</p>
          <div class="card-tag"><i class="fas fa-mobile-alt"></i> 安卓APK</div>
        </div>
        <!-- 占位卡片 未来新作 (灰色玻璃) -->
        <div class="game-card coming">
          <div class="game-icon"><i class="fas fa-question"></i></div>
          <h3>新作开发中</h3>
          <p>2025 敬请期待</p>
          <div class="card-tag"><i class="fas fa-hourglass"></i> 筹备</div>
        </div>
        <div class="game-card coming">
          <div class="game-icon"><i class="fas fa-star"></i></div>
          <h3>绝密项目</h3>
          <p>coming soon</p>
          <div class="card-tag"><i class="fas fa-lock"></i> 隐秘</div>
        </div>
        <div class="game-card coming">
          <div class="game-icon"><i class="fas fa-compact-disc"></i></div>
          <h3>节奏实验室</h3>
          <p>早期原型</p>
          <div class="card-tag"><i class="fas fa-flask"></i> 实验</div>
        </div>
      </div>
    </div>

    <!-- 底部 -->
    <footer class="footer">
      <div class="copyright">
        <i class="far fa-copyright"></i> 2025 翊铭游戏 · 独立创造
      </div>
      <div class="footer-links">
        <a href="#"><i class="fab fa-github"></i> GitHub</a>
        <a href="#"><i class="fas fa-envelope"></i> 联系</a>
        <a href="#"><i class="fas fa-history"></i> 更新</a>
      </div>
    </footer>
  </div>

  <!-- 提示：下载APK请将文件放置于 downloads/ 目录下，或修改为实际路径 -->
</body>
</html>
